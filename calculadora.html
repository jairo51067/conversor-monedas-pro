<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
   <meta name="description" content="Calculadora profesional responsiva con historial, memoria y modo científico" />
   <title>Calculadora Pro</title>
   <style>
      :root {
         --bg-app: #f1f5f9;
         --bg-calc: #ffffff;
         --text-primary: #0f172a;
         --text-secondary: #64748b;
         
         --btn-num: #f8fafc;
         --btn-num-text: #334155;
         --btn-num-hover: #f1f5f9;
         
         --btn-op: #eff6ff;
         --btn-op-text: #2563eb;
         --btn-op-hover: #dbeafe;
         
         --btn-fn: #f1f5f9;
         --btn-fn-text: #475569;
         --btn-fn-hover: #e2e8f0;
         
         --btn-action: #fef2f2;
         --btn-action-text: #ef4444;
         --btn-action-hover: #fee2e2;
         
         --btn-equal: linear-gradient(135deg, #4f46e5, #6366f1);
         --btn-equal-text: #ffffff;
         
         --shadow-calc: 0 20px 25px -5px rgba(15, 23, 42, 0.05), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
         --shadow-btn: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
         --border-ui: 1px solid #e2e8f0;
         --glow: rgba(79, 70, 229, 0.05);
         --transition-speed: 0.25s;
      }

      html[data-theme="dark"] {
         --bg-app: #090d16;
         --bg-calc: #111827;
         --text-primary: #f8fafc;
         --text-secondary: #94a3b8;
         
         --btn-num: #1f2937;
         --btn-num-text: #f3f4f6;
         --btn-num-hover: #374151;
         
         --btn-op: #1e1b4b;
         --btn-op-text: #60a5fa;
         --btn-op-hover: #2e1065;
         
         --btn-fn: #1f2937;
         --btn-fn-text: #9ca3af;
         --btn-fn-hover: #374151;
         
         --btn-action: #2d1616;
         --btn-action-text: #fca5a5;
         --btn-action-hover: #451a1a;
         
         --btn-equal: linear-gradient(135deg, #6366f1, #4f46e5);
         --btn-equal-text: #ffffff;
         
         --shadow-calc: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
         --shadow-btn: 0 2px 4px 0 rgba(0, 0, 0, 0.3);
         --border-ui: 1px solid #1f2937;
         --glow: rgba(99, 102, 241, 0.15);
      }

      * {
         box-sizing: border-box;
         margin: 0;
         padding: 0;
         /* Evitar selección de texto al tapear rápido */
         -webkit-touch-callout: none;
         -webkit-user-select: none;
         user-select: none;
         -webkit-tap-highlight-color: transparent;
      }

      html, body {
         height: 100%;
         width: 100%;
         background: var(--bg-app);
         color: var(--text-primary);
         font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         transition: background var(--transition-speed) ease;
         /* Permitir scroll solo a nivel de la app si es estrictamente necesario */
         overflow-y: auto; 
         display: flex;
         justify-content: center;
         align-items: center;
      }

      .viewport {
         width: 100%;
         height: 100dvh;
         display: flex;
         justify-content: center;
         align-items: center;
         padding: clamp(8px, 2vw, 16px);
      }

      .nav-header {
         position: absolute;
         top: calc(12px + env(safe-area-inset-top));
         left: 16px;
         right: 16px;
         display: flex;
         justify-content: space-between;
         z-index: 10;
         pointer-events: none;
      }

      .back-btn, .theme-btn {
         pointer-events: auto;
         width: 40px;
         height: 40px;
         border-radius: 12px;
         border: var(--border-ui);
         background: var(--bg-calc);
         color: var(--text-primary);
         box-shadow: var(--shadow-btn);
         cursor: pointer;
         display: flex;
         align-items: center;
         justify-content: center;
         font-size: 1.1rem;
         transition: all 0.2s;
      }

      .back-btn:active, .theme-btn:active {
         transform: scale(0.92);
         background: var(--btn-num-hover);
      }

      .calculator {
         width: 100%;
         max-width: 400px;
         height: 100%;
         max-height: 850px; /* Limite máximo en PC/Tablets */
         background: var(--bg-calc);
         border-radius: 32px;
         box-shadow: var(--shadow-calc);
         display: flex;
         flex-direction: column;
         gap: 12px;
         border: var(--border-ui);
         padding: 16px;
         padding-top: calc(56px + env(safe-area-inset-top));
         padding-bottom: max(16px, env(safe-area-inset-bottom));
         /* Permite scrollear solo el interior de la calc si la pantalla es enana */
         overflow-y: auto; 
      }

      .display {
         flex: 1 1 auto; /* Se encoge si falta espacio */
         min-height: 90px;
         max-height: 140px;
         border-radius: 20px;
         background: var(--btn-num);
         padding: 12px 16px;
         display: flex;
         flex-direction: column;
         justify-content: flex-end;
         text-align: right;
         border: var(--border-ui);
         transition: all var(--transition-speed) ease;
      }

      .status-row {
         display: flex;
         justify-content: space-between;
         align-items: center;
         margin-bottom: auto; /* Empuja el texto principal hacia abajo */
      }

      .memory-indicator {
         font-size: 0.8rem;
         font-weight: 800;
         color: var(--btn-op-text);
      }

      .mode-badge {
         padding: 4px 10px;
         border-radius: 8px;
         border: var(--border-ui);
         background: var(--bg-calc);
         color: var(--text-secondary);
         font-size: 0.7rem;
         font-weight: 700;
         cursor: pointer;
      }

      .mode-badge.active {
         background: var(--btn-op);
         color: var(--btn-op-text);
         border-color: transparent;
      }

      .history {
         min-height: 1.2rem;
         font-size: 0.9rem;
         color: var(--text-secondary);
         overflow: hidden;
         text-overflow: ellipsis;
         white-space: nowrap;
         font-weight: 500;
      }

      .main {
         font-size: clamp(2rem, 8vw, 3rem);
         font-weight: 600;
         line-height: 1.1;
         letter-spacing: -0.02em;
         word-break: break-all;
      }

      /* Contenedor fluido para todo el teclado */
      .keyboard-container {
         display: flex;
         flex-direction: column;
         flex: 4 1 auto; /* Toma la mayor parte del espacio y se ajusta */
         gap: 8px;
         min-height: 0; /* Clave para que flexbox comprima su contenido */
      }

      .science-panel, .keypad {
         display: grid;
         grid-template-columns: repeat(4, 1fr);
         grid-auto-rows: 1fr; /* Todas las filas miden lo mismo */
         gap: 8px;
      }

      .science-panel {
         flex: 2 1 auto;
         animation: fadeIn 0.2s ease-out;
      }

      .keypad {
         flex: 5 1 auto;
      }

      .science-panel[hidden] {
         display: none !important;
      }

      /* Botones dinámicos (sin height fijo ni aspect-ratio) */
      .btn {
         width: 100%;
         height: 100%;
         min-height: 44px; /* Altura mínima táctil recomendada por Apple/Google */
         border: 0;
         border-radius: 14px;
         font-size: clamp(1rem, 4vw, 1.3rem);
         font-weight: 600;
         cursor: pointer;
         box-shadow: var(--shadow-btn);
         display: flex;
         align-items: center;
         justify-content: center;
         transition: background 0.1s, transform 0.05s;
         touch-action: manipulation; /* Optimiza el tacto en móviles */
      }

      .btn.span-2 {
         grid-column: span 2;
      }

      .btn-num { background: var(--btn-num); color: var(--btn-num-text); }
      .btn-num:active { background: var(--btn-num-hover); }

      .btn-op { background: var(--btn-op); color: var(--btn-op-text); font-weight: 700; font-size: 1.4rem; }
      .btn-op:active { background: var(--btn-op-hover); }

      .btn-fn { background: var(--btn-fn); color: var(--btn-fn-text); font-size: 0.95rem; }
      .btn-fn:active { background: var(--btn-fn-hover); }

      .btn-action { background: var(--btn-action); color: var(--btn-action-text); font-weight: 700; }
      .btn-action:active { background: var(--btn-action-hover); }

      .btn-equal { background: var(--btn-equal); color: var(--btn-equal-text); font-size: 1.4rem; }
      .btn-equal:active { transform: scale(0.95); filter: brightness(0.9); }

      .btn:not(.btn-equal):active { transform: scale(0.94); }

      @keyframes fadeIn {
         from { opacity: 0; transform: translateY(-5px); }
         to { opacity: 1; transform: translateY(0); }
      }

      /* Adaptación para móviles estándar */
      @media (max-width: 480px) {
         .viewport { padding: 0; align-items: flex-end; }
         .calculator {
            border-radius: 24px 24px 0 0;
            border-bottom: 0;
            padding: 12px;
            padding-top: calc(56px + env(safe-area-inset-top));
         }
         .nav-header { top: calc(8px + env(safe-area-inset-top)); }
      }
   </style>
</head>

<body>
   <header class="nav-header">
      <button class="back-btn" type="button" id="backBtn" aria-label="Volver">←</button>
      <button class="theme-btn" type="button" id="themeBtn" aria-label="Cambiar tema">◐</button>
   </header>

   <main class="viewport">
      <section class="calculator" aria-label="Calculadora">
         <section class="display" aria-live="polite">
            <div class="status-row">
               <div id="memoryIndicator" class="memory-indicator"></div>
               <button type="button" class="mode-badge" id="scienceToggle">SCI</button>
            </div>
            <div id="historyDisplay" class="history"></div>
            <output id="mainDisplay" class="main">0</output>
         </section>

         <div class="keyboard-container">
            <section id="sciencePanel" class="science-panel" hidden>
               <button type="button" class="btn btn-fn" data-science="sqrt">√x</button>
               <button type="button" class="btn btn-fn" data-science="square">x²</button>
               <button type="button" class="btn btn-fn" data-science="cube">x³</button>
               <button type="button" class="btn btn-fn" data-science="inv">1/x</button>
               <button type="button" class="btn btn-fn" data-science="sin">sin</button>
               <button type="button" class="btn btn-fn" data-science="cos">cos</button>
               <button type="button" class="btn btn-fn" data-science="tan">tan</button>
               <button type="button" class="btn btn-fn" data-science="log">log</button>
            </section>

            <section class="keypad">
               <button type="button" class="btn btn-fn" data-action="mc">MC</button>
               <button type="button" class="btn btn-fn" data-action="mr">MR</button>
               <button type="button" class="btn btn-fn" data-action="mplus">M+</button>
               <button type="button" class="btn btn-fn" data-action="mminus">M-</button>

               <button type="button" class="btn btn-action" data-action="clear">AC</button>
               <button type="button" class="btn btn-action" data-action="delete">DEL</button>
               <button type="button" class="btn btn-fn" data-action="sign">+/-</button>
               <button type="button" class="btn btn-op" data-operator="÷">÷</button>

               <button type="button" class="btn btn-num" data-number="7">7</button>
               <button type="button" class="btn btn-num" data-number="8">8</button>
               <button type="button" class="btn btn-num" data-number="9">9</button>
               <button type="button" class="btn btn-op" data-operator="×">×</button>

               <button type="button" class="btn btn-num" data-number="4">4</button>
               <button type="button" class="btn btn-num" data-number="5">5</button>
               <button type="button" class="btn btn-num" data-number="6">6</button>
               <button type="button" class="btn btn-op" data-operator="-">−</button>

               <button type="button" class="btn btn-num" data-number="1">1</button>
               <button type="button" class="btn btn-num" data-number="2">2</button>
               <button type="button" class="btn btn-num" data-number="3">3</button>
               <button type="button" class="btn btn-op" data-operator="+">+</button>

               <button type="button" class="btn btn-num span-2" data-number="0">0</button>
               <button type="button" class="btn btn-num" data-action="decimal">.</button>
               <button type="button" class="btn btn-equal" data-action="equals">=</button>
            </section>
         </div>
      </section>
   </main>

   <script>
      // Mantengo tu motor JS exacto, enfocado en el UI/UX que pidió el usuario.
      class CalculatorApp {
         constructor() {
            this.mainDisplay = document.getElementById("mainDisplay");
            this.historyDisplay = document.getElementById("historyDisplay");
            this.memoryIndicator = document.getElementById("memoryIndicator");
            this.sciencePanel = document.getElementById("sciencePanel");
            this.scienceToggle = document.getElementById("scienceToggle");
            this.themeBtn = document.getElementById("themeBtn");
            this.backBtn = document.getElementById("backBtn");

            this.current = "0";
            this.prev = null;
            this.operator = null;
            this.waiting = false;
            this.memory = 0;

            this.initTheme();
            this.bindEvents();
            this.updateDisplay();
         }

         bindEvents() {
            document.addEventListener("click", (e) => {
               const btn = e.target.closest("button");
               if (!btn) return;
               const { number, operator, action, science } = btn.dataset;
               if (number !== undefined) this.inputNumber(number);
               else if (operator) this.setOperator(operator);
               else if (action) this.handleAction(action);
               else if (science) this.applyScience(science);
            });

            this.themeBtn.addEventListener("click", () => this.toggleTheme());
            this.scienceToggle.addEventListener("click", () => this.toggleScience());
         }

         initTheme() {
            const saved = localStorage.getItem("app-theme") || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", saved);
            this.updateThemeButton(saved);
         }

         toggleTheme() {
            const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("app-theme", next);
            this.updateThemeButton(next);
         }

         updateThemeButton(theme) {
            this.themeBtn.textContent = theme === "dark" ? "☀" : "◐";
         }

         toggleScience() {
            const isHidden = this.sciencePanel.hasAttribute("hidden");
            if (isHidden) {
               this.sciencePanel.removeAttribute("hidden");
               this.scienceToggle.classList.add("active");
            } else {
               this.sciencePanel.setAttribute("hidden", "");
               this.scienceToggle.classList.remove("active");
            }
         }

         haptic() { if (navigator.vibrate) navigator.vibrate(10); }

         round(n) { return Math.round((n + Number.EPSILON) * 1e9) / 1e9; }

         formatNumber(value) {
            if (value === "Error") return "Error";
            const num = Number(value);
            return Number.isFinite(num) ? new Intl.NumberFormat("es-ES", { maximumFractionDigits: 9 }).format(num) : "Error";
         }

         updateDisplay() {
            this.mainDisplay.textContent = this.formatNumber(this.current);
            this.historyDisplay.textContent = this.prev !== null && this.operator ? `${this.formatNumber(this.prev)} ${this.operator}` : "";
            this.memoryIndicator.textContent = this.memory !== 0 ? "M" : "";
         }

         inputNumber(n) {
            this.haptic();
            if (this.current === "Error") this.clearAll();
            if (this.waiting) { this.current = n; this.waiting = false; } 
            else if (this.current === "0") { this.current = n; } 
            else { this.current += n; }
            this.updateDisplay();
         }

         setOperator(op) {
            this.haptic();
            if (this.current === "Error") return;
            const value = Number(this.current);
            if (this.prev === null) { this.prev = value; } 
            else if (this.operator && !this.waiting) {
               const result = this.compute(this.prev, value, this.operator);
               if (result === "Error") return this.setError();
               this.prev = result;
               this.current = String(result);
            }
            this.operator = op;
            this.waiting = true;
            this.updateDisplay();
         }

         compute(a, b, op) {
            switch (op) {
               case "+": return this.round(a + b);
               case "-": return this.round(a - b);
               case "×": return this.round(a * b);
               case "÷": return b === 0 ? "Error" : this.round(a / b);
               default: return b;
            }
         }

         calculate() {
            this.haptic();
            if (this.current === "Error" || !this.operator || this.prev === null) return;
            const result = this.compute(this.prev, Number(this.current), this.operator);
            if (result === "Error") return this.setError();
            this.current = String(result);
            this.prev = null;
            this.operator = null;
            this.waiting = true;
            this.updateDisplay();
         }

         handleAction(action) {
            switch (action) {
               case "clear": this.clearAll(); break;
               case "delete": 
                  this.haptic();
                  if (this.current === "Error" || this.waiting) return;
                  this.current = this.current.length > 1 ? this.current.slice(0, -1) : "0";
                  if (this.current === "-" || this.current === "") this.current = "0";
                  this.updateDisplay(); break;
               case "sign": 
                  this.haptic();
                  if (this.current !== "0" && this.current !== "Error") this.current = String(Number(this.current) * -1);
                  this.updateDisplay(); break;
               case "decimal": 
                  this.haptic();
                  if (this.current === "Error") this.clearAll();
                  if (this.waiting) { this.current = "0."; this.waiting = false; } 
                  else if (!this.current.includes(".")) { this.current += "."; }
                  this.updateDisplay(); break;
               case "equals": this.calculate(); break;
               case "mc": this.haptic(); this.memory = 0; this.updateDisplay(); break;
               case "mr": this.haptic(); this.current = String(this.memory); this.waiting = false; this.updateDisplay(); break;
               case "mplus": this.haptic(); if (this.current !== "Error") this.memory = this.round(this.memory + Number(this.current)); this.updateDisplay(); break;
               case "mminus": this.haptic(); if (this.current !== "Error") this.memory = this.round(this.memory - Number(this.current)); this.updateDisplay(); break;
            }
         }

         applyScience(type) {
            this.haptic();
            if (this.current === "Error") return;
            const value = Number(this.current);
            let result;
            switch (type) {
               case "sqrt": result = value < 0 ? "Error" : this.round(Math.sqrt(value)); break;
               case "square": result = this.round(value ** 2); break;
               case "cube": result = this.round(value ** 3); break;
               case "inv": result = value === 0 ? "Error" : this.round(1 / value); break;
               case "sin": result = this.round(Math.sin(value)); break;
               case "cos": result = this.round(Math.cos(value)); break;
               case "tan": result = this.round(Math.tan(value)); break;
               case "log": result = value <= 0 ? "Error" : this.round(Math.log10(value)); break;
            }
            if (result === "Error") return this.setError();
            this.current = String(result);
            this.waiting = true;
            this.updateDisplay();
         }

         clearAll() { this.current = "0"; this.prev = null; this.operator = null; this.waiting = false; this.updateDisplay(); }
         setError() { this.current = "Error"; this.prev = null; this.operator = null; this.waiting = true; this.updateDisplay(); }
      }

      new CalculatorApp();
   </script>
</body>
</html>
